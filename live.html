<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>即時結果大屏</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: "PingFang TC", "Noto Sans TC", sans-serif; }</style>
</head>
<body class="bg-gradient-to-br from-[#1a1b3a] via-[#2d1b4e] to-[#1a1b3a] min-h-screen text-white">
  <main class="max-w-6xl mx-auto px-6 py-8">
    <header class="flex flex-wrap items-end justify-between gap-3 mb-8 pb-4 border-b border-white/10">
      <div>
        <p class="text-white/60 text-sm mb-1">即時結果大屏</p>
        <h1 id="title" class="text-2xl md:text-3xl font-bold"></h1>
      </div>
      <div class="text-right text-sm text-white/70">
        <div>已填寫：<span id="totalCount" class="text-2xl font-bold text-white">0</span> 人</div>
        <div id="lastUpdate" class="text-xs text-white/40 mt-1"></div>
      </div>
    </header>

    <div id="errorBox" class="hidden mb-6 bg-red-500/20 border border-red-400/30 rounded-xl p-4 text-sm text-red-100"></div>

    <section id="distGrid" class="grid md:grid-cols-5 gap-4 mb-10"></section>

    <section>
      <h2 class="text-lg font-semibold mb-3 text-white/80" id="recentTitle">最近填寫</h2>
      <div class="bg-white/5 rounded-2xl p-4 border border-white/10">
        <ul id="recentList" class="divide-y divide-white/10"></ul>
        <p id="emptyMsg" class="text-white/50 text-center py-8 hidden">還沒有人填寫，等待學員送出中⋯</p>
      </div>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./questions.js"></script>
  <script>
    const S = window.SURVEY;
    const CFG = window.SURVEY_CONFIG;
    document.getElementById("title").textContent = `${S.emoji} ${S.title}`;

    const errorBox = document.getElementById("errorBox");

    function parseCsvLine(line) {
      const out = [];
      let cur = "", inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQ && line[i+1] === '"') { cur += '"'; i++; }
          else inQ = !inQ;
        } else if (ch === "," && !inQ) { out.push(cur); cur = ""; }
        else cur += ch;
      }
      out.push(cur);
      return out;
    }

    function parseCsv(text) {
      const lines = text.trim().split(/\r?\n/);
      if (lines.length <= 1) return [];
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = parseCsvLine(lines[i]);
        if (cols.length < 5) continue;
        rows.push({
          submittedAt: cols[0] ?? "",
          slug: cols[1] ?? "",
          name: cols[2] ?? "匿名",
          typeName: cols[3] ?? "",
          typeCode: cols[4] ?? "",
        });
      }
      return rows;
    }

    function renderDist(rows) {
      const total = rows.length;
      document.getElementById("totalCount").textContent = total;
      const keys = [1,2,3,4,5];
      const counts = keys.map(k => ({
        key: k, type: S.types[k],
        count: rows.filter(r => r.typeCode === S.types[k].code).length,
      }));
      const maxC = Math.max(1, ...counts.map(c => c.count));

      document.getElementById("distGrid").innerHTML = counts.map(c => {
        const pct = total === 0 ? 0 : (c.count / total) * 100;
        const barH = (c.count / maxC) * 100;
        return `
          <div class="bg-white/10 backdrop-blur rounded-2xl p-4 border border-white/10">
            <div class="flex items-end justify-between mb-3">
              <div>
                <div class="text-3xl">${c.type.emoji}</div>
                <div class="text-sm font-semibold mt-1">${c.type.name}</div>
              </div>
              <div class="text-right">
                <div class="text-3xl font-bold">${c.count}</div>
                <div class="text-xs text-white/60">${pct.toFixed(0)}%</div>
              </div>
            </div>
            <div class="h-24 bg-white/5 rounded-lg flex items-end overflow-hidden">
              <div class="w-full bg-gradient-to-t from-rose-400 to-rose-200 transition-all duration-500" style="height:${barH}%"></div>
            </div>
            <p class="text-xs text-white/60 mt-3 leading-relaxed">${c.type.analysis}</p>
          </div>`;
      }).join("");
    }

    function renderRecent(rows) {
      const list = document.getElementById("recentList");
      const empty = document.getElementById("emptyMsg");
      const title = document.getElementById("recentTitle");

      if (rows.length === 0) {
        list.innerHTML = "";
        empty.classList.remove("hidden");
        title.textContent = "最近填寫";
        return;
      }
      empty.classList.add("hidden");
      title.textContent = rows.length > 20 ? "最近填寫（最新 20 筆）" : `最近填寫（共 ${rows.length} 筆）`;

      const typeByCode = {};
      Object.values(S.types).forEach(t => { typeByCode[t.code] = t; });

      list.innerHTML = rows.slice(-20).reverse().map(r => {
        const t = typeByCode[r.typeCode];
        return `
          <li class="flex items-center justify-between py-2 text-sm">
            <span class="flex items-center gap-2">
              <span class="text-xl">${t ? t.emoji : "•"}</span>
              <span class="font-medium">${escapeHtml(r.name)}</span>
            </span>
            <span class="text-white/60">${escapeHtml(r.typeName)}</span>
          </li>`;
      }).join("");
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
    }

    async function fetchAndRender() {
      if (!CFG.SHEET_CSV_URL) {
        errorBox.textContent = "尚未設定試算表 CSV 網址。請編輯 config.js 填入 SHEET_CSV_URL。";
        errorBox.classList.remove("hidden");
        return;
      }
      try {
        const res = await fetch(`${CFG.SHEET_CSV_URL}&_=${Date.now()}`, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const text = await res.text();
        const rows = parseCsv(text).filter(r => r.slug === S.slug && r.typeCode);
        renderDist(rows);
        renderRecent(rows);
        document.getElementById("lastUpdate").textContent = "最後更新 " + new Date().toLocaleTimeString("zh-TW");
        errorBox.classList.add("hidden");
      } catch (e) {
        errorBox.textContent = "讀取試算表失敗：" + e.message;
        errorBox.classList.remove("hidden");
      }
    }

    renderDist([]);
    renderRecent([]);
    fetchAndRender();
    setInterval(fetchAndRender, 2000);
  </script>
</body>
</html>
